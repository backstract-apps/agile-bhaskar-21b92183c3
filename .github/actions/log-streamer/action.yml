name: BackStract GitHub Actions Log Streamer
description: Stream shell command logs to BackStract's backend in real time.

inputs:
  command:
    description: Shell command to run
    required: true
  endpoint:
    description: Log streaming HTTP endpoint
    required: true
  token:
    description: Auth token
    required: true
  step_name:
    description: Name of the deployment step
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        STEP_NAME: ${{ inputs.step_name }}
        STREAM_ENDPOINT: ${{ inputs.endpoint }}
        STREAM_TOKEN: ${{ inputs.token }}
      run: |
        #!/usr/bin/env bash

        # Function to send logs to the API
        send_logs() {
          local log_payload="$1"
          local json
          json=$(jq -nc \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg step "$STEP_NAME" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "$GITHUB_REF_NAME" \
            --arg commit_sha "$GITHUB_SHA" \
            --arg actor "$GITHUB_ACTOR" \
            --argjson logs "$log_payload" \
            '{run_id: $run_id, step: $step, repository: $repo, branch: $branch, commit_sha: $commit_sha, actor: $actor, logs: $logs}')

          # -m 5 ensures curl gives up after 5s if server hangs
          curl -s -m 5 -X POST "$STREAM_ENDPOINT" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $STREAM_TOKEN" \
            -d "$json" > /dev/null || true
        }

        export -f send_logs
        export STEP_NAME STREAM_ENDPOINT STREAM_TOKEN GITHUB_RUN_ID GITHUB_REPOSITORY GITHUB_REF_NAME GITHUB_SHA GITHUB_ACTOR

        script_file=$(mktemp)
        cat <<'EOF' > "$script_file"
        ${{ inputs.command }}
        EOF
        chmod +x "$script_file"

        # Execute and stream logs in chunks of 100 lines to reduce HTTP overhead
        # This pipes STDOUT/STDERR directly into AWK for real-time processing
        set +e
        bash "$script_file" 2>&1 | awk '{
            print $0;
            if (buffer == "") { buffer = $0 } else { buffer = buffer "\n" $0 }
            count++;
            if (count >= 100) {
                system("printf %s " q buffer q " | jq -Rs . | jq -cs . | xargs -0 -I {} bash -c \"send_logs '\''{}'\''\"")
                buffer = "";
                count = 0;
            }
        } END {
            if (count > 0) {
                system("printf %s " q buffer q " | jq -Rs . | jq -cs . | xargs -0 -I {} bash -c \"send_logs '\''{}'\''\"")
            }
        }' q="'"
        
        command_exit_code="${PIPESTATUS[0]}"
        rm -f "$script_file"
        exit "$command_exit_code"
